name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: YT7th-windows.zip
          - os: macos-14
            artifact: YT7th-macos.zip
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: python -m pip install -r requirements.txt pyinstaller

      - name: Smoke import
        run: python -c "import data, auth, resources, updater, downloader, version"

      - name: Fetch ffmpeg, ffprobe, deno (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force bin | Out-Null
          # FFmpeg + ffprobe (BtbN static)
          $ff = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest $ff -OutFile ff.zip
          Expand-Archive ff.zip -DestinationPath fftmp
          Copy-Item (Get-ChildItem fftmp -Recurse -Filter ffmpeg.exe)[0].FullName bin/ffmpeg.exe
          Copy-Item (Get-ChildItem fftmp -Recurse -Filter ffprobe.exe)[0].FullName bin/ffprobe.exe
          # Deno
          $dn = "https://github.com/denoland/deno/releases/latest/download/deno-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest $dn -OutFile deno.zip
          Expand-Archive deno.zip -DestinationPath dntmp
          Copy-Item dntmp/deno.exe bin/deno.exe

      - name: Fetch ffmpeg, ffprobe, deno + make icns (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p bin
          # FFmpeg + ffprobe (evermeet static x86_64)
          curl -L -o ffmpeg.zip https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip
          curl -L -o ffprobe.zip https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip
          unzip -o ffmpeg.zip -d bin
          unzip -o ffprobe.zip -d bin
          chmod +x bin/ffmpeg bin/ffprobe
          # Deno (arm64, native on Apple Silicon)
          curl -L -o deno.zip https://github.com/denoland/deno/releases/latest/download/deno-aarch64-apple-darwin.zip
          unzip -o deno.zip -d bin
          chmod +x bin/deno
          # Generate .icns from logo.png
          mkdir -p logo.iconset
          for s in 16 32 64 128 256 512; do
            sips -z $s $s assets/logo.png --out logo.iconset/icon_${s}x${s}.png
            d=$((s*2)); sips -z $d $d assets/logo.png --out logo.iconset/icon_${s}x${s}@2x.png
          done
          iconutil -c icns logo.iconset -o assets/logo.icns

      - name: Build
        run: pyinstaller build.spec

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/YT7th/* -DestinationPath ${{ matrix.artifact }}

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent dist/YT7th.app ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN || github.token }}
          files: ${{ matrix.artifact }}
